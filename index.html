<div class="proto">
  <div class="char-bar">
    <button class="char-btn active" onclick="sw('margaret',this)">Margaret<span class="role">Caller</span></button>
    <button class="char-btn" onclick="sw('raymond',this)">Raymond<span class="role">Branch banker</span></button>
    <button class="char-btn" onclick="sw('specialist',this)">Specialist<span class="role">Call center</span></button>
    <button class="char-btn" onclick="sw('asif',this)">Asif<span class="role">Ops manager</span></button>
  </div>
  <div class="view-area">
    <div class="view active" id="v-margaret"></div>
    <div class="view" id="v-raymond"></div>
    <div class="view" id="v-specialist"></div>
    <div class="view" id="v-asif"></div>
  </div>
  <div class="timeline-wrap">

      <button class="play-btn" id="playbtn" onclick="togglePlay()">
        <svg id="playicon" viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
      </button>
      <div class="tl-track">
        <div class="tl-line"></div>
        <div class="tl-fill" id="tl-fill"></div>

      </div>
    </div>
    <div class="tl-labels" id="tl-labels"></div>

<script>
const PHASES=['Trigger','AI intercept','Routing','Handoff','Resolution','Wrap-up'];
const CHARS=['margaret','raymond','specialist','asif'];
let cur='margaret',phase=0,playing=false,timer=null;
let summaryEditing=false;
let summaryData={name:'Margaret Hooper',account:'••4421 (checking)',branch:'Midtown East',since:'2011',issue:'Dispute — $247 AMZN',risk:'74 / high'};

function sw(c,btn){
  cur=c;
  CHARS.forEach(x=>document.getElementById('v-'+x).classList.remove('active'));
  document.querySelectorAll('.char-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('v-'+c).classList.add('active');
  btn.classList.add('active');
  render();
}
function setPhase(p){phase=p;summaryEditing=false;updateTimeline();render();}
function updateTimeline(){
  const pct=phase===0?0:(phase/(PHASES.length-1)*100);
  document.getElementById('tl-fill').style.width=pct+'%';
  document.querySelectorAll('.tl-dot').forEach((d,i)=>{d.classList.remove('done','active');if(i<phase)d.classList.add('done');else if(i===phase)d.classList.add('active');});
  document.querySelectorAll('.tl-label').forEach((l,i)=>l.classList.toggle('active',i===phase));
}
function buildTimeline(){
  document.getElementById('tl-dots').innerHTML=PHASES.map((_,i)=>`<div class="tl-dot${i===0?' active':''}" onclick="setPhase(${i})"></div>`).join('');
  document.getElementById('tl-labels').innerHTML=PHASES.map((ph,i)=>`<div class="tl-label${i===0?' active':''}" onclick="setPhase(${i})">${ph}</div>`).join('');
}
function togglePlay(){
  playing=!playing;
  document.getElementById('playicon').innerHTML=playing?'<rect x="1.5" y="1" width="3" height="8"/><rect x="5.5" y="1" width="3" height="8"/>':'<polygon points="2,1 9,5 2,9"/>';
  if(playing)autoPlay();else clearTimeout(timer);
}
function autoPlay(){if(!playing)return;setPhase((phase+1)%PHASES.length);timer=setTimeout(autoPlay,2200);}

function b(txt,type){return`<span class="phase-badge badge-${type}">${txt}</span>`}
function render(){rMargaret();rRaymond();rSpecialist();rAsif();}

/* status bar svg icons — fixed size always */
const statusIcons=`

  <svg width="12" height="10" viewBox="0 0 14 11" fill="#fff"><path d="M7 2C9.2 2 11.2 3 12.6 4.6L11.4 5.8C10.3 4.5 8.8 3.7 7 3.7S3.7 4.5 2.6 5.8L1.4 4.6C2.8 3 4.8 2 7 2zM7 5.5c1.4 0 2.5.6 3.3 1.5L9.1 8.1C8.5 7.4 7.8 7 7 7s-1.5.4-2.1 1.1L3.7 7c.8-.9 1.9-1.5 3.3-1.5zM7 9a1.5 1.5 0 110 3A1.5 1.5 0 017 9z"/></svg>
  <svg width="22" height="10" viewBox="0 0 22 11" fill="none"><rect x=".5" y="1" width="18" height="9" rx="2" stroke="#fff" stroke-width="1"/><rect x="2" y="2.5" width="12" height="6" rx="1" fill="#fff"/><path d="M20 3.5v4c1-.7 1-3.3 0-4z" fill="#fff"/></svg>`;

/* phone frame wrapper — FIXED 200×420 always */
function phone(bodyHTML){
  return`<div class="phone-col">
    <div class="phone-device">
      <div class="phone-btn-l1"></div><div class="phone-btn-l2"></div><div class="phone-btn-l3"></div><div class="phone-btn-r"></div>

        <div class="home-bar"><div class="home-ind"></div></div>
      </div>

}

/* call controls reused across phases */
const callControls=`<div class="call-action-grid">
  <div class="call-action"><div class="cab"><svg viewBox="0 0 24 24"><path d="M15.5 8.5a5 5 0 010 7M12 6a8 8 0 010 12" stroke="rgba(255,255,255,.8)" fill="none" stroke-width="1.8"/></svg></div><div class="cal">speaker</div></div>
  <div class="call-action"><div class="cab"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,.8)"><path d="M17 11c0 2.8-2.2 5-5 5s-5-2.2-5-5V5c0-2.8 2.2-5 5-5s5 2.2 5 5v6zm-5 7c3.9 0 7-3.1 7-7h-2c0 2.8-2.2 5-5 5s-5-2.2-5-5H5c0 3.9 3.1 7 7 7zm-1 3h2v-2h-2v2z"/></svg></div><div class="cal">mute</div></div>
  <div class="call-action"><div class="cab"><svg viewBox="0 0 24 24" fill="rgba(255,255,255,.8)"><path d="M3 3h7v2H5v4H3V3zm11 0h7v6h-2V5h-5V3zM3 13h2v4h5v2H3v-6zm16 4h-5v2h7v-6h-2v4z"/></svg></div><div class="cal">keypad</div></div>
</div>
<div class="end-btn" style="margin-top:8px"><svg viewBox="0 0 24 24" fill="white"><path d="M3 5h4l2 5-2 2a12 12 0 005 5l2-2 5 2v4a2 2 0 01-2 2C7 22 2 17 2 7a2 2 0 012-2z"/></svg></div>`;

/* ── Margaret ── */
function rMargaret(){
  const el=document.getElementById('v-margaret'); const p=phase;
  let body='', note='', badgeType='gray';

  if(p===0){
    badgeType='gray';
    body=`<div style="background:linear-gradient(160deg,#0C447C,#185FA5);padding:14px 12px 10px;flex-shrink:0">
      <div style="font-size:10px;color:rgba(255,255,255,.55);margin-bottom:1px">Chase Bank</div>
      <div style="font-size:13px;font-weight:500;color:#fff">Checking ••4421</div>
      <div style="font-size:22px;font-weight:300;color:#fff;margin:6px 0 2px">$3,842.50</div>
      <div style="font-size:10px;color:rgba(255,255,255,.45)">Available balance</div>
    </div>
    <div style="flex:1;padding:10px 12px;overflow:hidden">
      <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,.35);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase">Recent</div>
      <div style="background:rgba(229,75,74,.15);border:1px solid rgba(229,75,74,.35);border-radius:9px;padding:8px 10px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-size:11px;font-weight:500;color:#fff">AMZN*MKTP</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:1px">Apr 27 &middot; Card</div></div>
          <div style="text-align:right"><div style="font-size:12px;font-weight:500;color:#F09595">-$247.00</div><div style="font-size:10px;color:rgba(229,75,74,.8);margin-top:1px">Not recognised?</div></div>

/* ── Edit helpers ── */
function toggleEdit(){
  if(!summaryEditing){summaryEditing=true;}
  else{['name','account','branch','since','issue','risk'].forEach(f=>{const e=document.getElementById('si-'+f);if(e)summaryData[f]=e.value;});summaryEditing=false;}
  rRaymond();
}
function cancelEdit(){summaryEditing=false;rRaymond();}
function buildSummaryCard(withData){
  const eIco=`<svg viewBox="0 0 12 12" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M8.5 1.5l2 2-6 6H2.5v-2l6-6z"/></svg>`;
  const sIco=`<svg viewBox="0 0 12 12" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,6 5,9 10,3"/></svg>`;
  if(!withData)return`<div class="card"><h4>Summary — Caller</h4><div style="font-size:12px;color:#888780;padding:6px 0">No active call.</div></div>`;
  const labels={name:'Name',account:'Account',branch:'Branch',since:'Customer since',issue:'Issue',risk:'Risk score'};
  if(!summaryEditing)return`<div class="card"><h4>Summary — Caller<button class="edit-btn" onclick="toggleEdit()">${eIco} Edit</button></h4>${Object.keys(labels).map(f=>`<div class="card-row"><span class="lbl">${labels[f]}</span><span class="${f==='issue'||f==='risk'?'val-flag':'val'}">${summaryData[f]}</span></div>`).join('')}</div>`;
  return`<div class="card"><h4>Summary — Caller<div style="display:flex;gap:5px"><button class="edit-btn saving" onclick="toggleEdit()">${sIco} Save</button><button class="edit-btn" onclick="cancelEdit()" style="color:#791F1F;border-color:#F09595;background:#FCEBEB">✕</button></div></h4>${Object.keys(labels).map(f=>`<div class="card-row"><span class="lbl">${labels[f]}</span><input class="edit-input" id="si-${f}" value="${summaryData[f]}"/></div>`).join('')}</div>`;
}
