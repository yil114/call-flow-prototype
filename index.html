<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Margaret's Journey — Chase Lex Ave</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0A0A0F;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;color:#fff}

/* header */
.header{width:100%;max-width:900px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end}
.header-tag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px}
.header-title{font-size:22px;font-weight:300;color:#fff;letter-spacing:-.4px;line-height:1.2}
.header-title span{font-weight:600;color:#7F77DD}
.header-sub{font-size:12px;color:rgba(255,255,255,.3);margin-top:5px}
.phase-counter{text-align:right;font-size:11px;color:rgba(255,255,255,.25)}
.phase-counter strong{font-size:26px;font-weight:300;color:#fff;display:block;line-height:1}

/* stage */
.stage{width:100%;max-width:900px;background:#111118;border:1px solid rgba(255,255,255,.07);border-radius:20px;overflow:hidden;display:flex;min-height:500px}

/* phone column */
.phone-col{flex-shrink:0;width:228px;padding:28px 0 28px 28px;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#0D0D17 0%,#111118 100%);border-right:1px solid rgba(255,255,255,.05)}
.pd{width:180px;height:390px;background:#1C1C1E;border-radius:34px;padding:0 7px 9px;border:1.5px solid #2A2A2C;position:relative;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 28px 72px rgba(0,0,0,.65),0 4px 16px rgba(0,0,0,.4)}
.bl1{position:absolute;left:-3px;top:68px;width:2.5px;height:24px;background:#2A2A2C;border-radius:2px 0 0 2px}
.bl2{position:absolute;left:-3px;top:102px;width:2.5px;height:40px;background:#2A2A2C;border-radius:2px 0 0 2px}
.bl3{position:absolute;left:-3px;top:152px;width:2.5px;height:40px;background:#2A2A2C;border-radius:2px 0 0 2px}
.br{position:absolute;right:-3px;top:94px;width:2.5px;height:54px;background:#2A2A2C;border-radius:0 2px 2px 0}
.pn{width:74px;height:21px;background:#1C1C1E;border-radius:0 0 13px 13px;margin:0 auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;z-index:2}
.nc{width:6px;height:6px;border-radius:50%;background:#2A2A2C;border:1px solid #333}
.ns{width:32px;height:4px;border-radius:2px;background:#2A2A2C}
.psi{flex:1;background:#000;border-radius:0 0 26px 26px;overflow:hidden;display:flex;flex-direction:column}
.sb{display:flex;justify-content:space-between;align-items:center;padding:5px 12px 2px;font-size:9px;font-weight:600;color:#fff;flex-shrink:0;letter-spacing:.02em}
.sbicons{display:flex;align-items:center;gap:2.5px}
.scb{flex:1;overflow:hidden;display:flex;flex-direction:column}
.hb{height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hi{width:62px;height:3px;background:#2C2C2E;border-radius:2px}

/* content column */
.cc{flex:1;padding:32px 36px;display:flex;flex-direction:column}
.phase-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:4px 11px;border-radius:20px;border:1px solid;margin-bottom:18px;width:fit-content}
.bg-gray{background:rgba(255,255,255,.04);color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.09)}
.bg-purple{background:rgba(127,119,221,.1);color:#AFA9EC;border-color:rgba(127,119,221,.22)}
.bg-amber{background:rgba(239,159,39,.09);color:#EF9F27;border-color:rgba(239,159,39,.22)}
.bg-blue{background:rgba(55,138,221,.1);color:#85B7EB;border-color:rgba(55,138,221,.22)}
.bg-green{background:rgba(58,155,58,.09);color:#7CC45E;border-color:rgba(58,155,58,.22)}
.bdot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.65;flex-shrink:0}

.ti{font-size:19px;font-weight:500;color:#fff;letter-spacing:-.35px;line-height:1.3;margin-bottom:12px}
.ti.blue{color:#85B7EB}
.bo{font-size:13px;color:rgba(255,255,255,.48);line-height:1.75;margin-bottom:16px}
.fo{font-size:11px;color:rgba(255,255,255,.25);line-height:1.6;margin-top:12px}

.hl{background:rgba(58,155,58,.07);border:1px solid rgba(58,155,58,.18);border-left:3px solid #4CAF50;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#8BC87A;line-height:1.55;margin-bottom:12px}
.hlp{background:rgba(127,119,221,.07);border:1px solid rgba(127,119,221,.18);border-left:3px solid #7F77DD;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:#C5C0F5;line-height:1.55;margin-bottom:12px}

/* timeline */
.timeline-wrap{width:100%;max-width:900px;margin-top:20px;display:flex;flex-direction:column;gap:10px}
.tl-row{display:flex;align-items:center;gap:12px}
.play-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.play-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18)}
.play-btn svg{width:10px;height:10px}
.tl-track{flex:1;position:relative;height:2px;background:rgba(255,255,255,.07);border-radius:1px}
.tl-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#7F77DD,#5B9BD5);border-radius:1px;transition:width .3s ease}
.tl-dots-row{display:flex;justify-content:space-between;margin-left:44px}
.tdw{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.tdot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.14);background:transparent;transition:all .2s;position:relative;top:-5px}
.tdot.done{background:rgba(127,119,221,.45);border-color:rgba(127,119,221,.55)}
.tdot.active{background:#7F77DD;border-color:#AFA9EC;box-shadow:0 0 8px rgba(127,119,221,.5);transform:scale(1.3)}
.tdw:hover .tdot{border-color:rgba(255,255,255,.35);transform:scale(1.15)}
.tdw.ac .tdot:hover{transform:scale(1.3)}
.tlbl{font-size:10px;color:rgba(255,255,255,.22);text-align:center;line-height:1.3;transition:color .2s;white-space:nowrap}
.tdw:hover .tlbl{color:rgba(255,255,255,.45)}
.tdw.ac .tlbl{color:#AFA9EC;font-weight:500}

/* phone internals */
.wf{display:flex;align-items:center;justify-content:center;gap:3px;height:18px}
.wb{width:3px;border-radius:2px;background:rgba(255,255,255,.6);animation:wv .8s ease-in-out infinite}
.wb:nth-child(1){height:6px}.wb:nth-child(2){height:11px;animation-delay:.1s}.wb:nth-child(3){height:16px;animation-delay:.2s}.wb:nth-child(4){height:8px;animation-delay:.3s}.wb:nth-child(5){height:13px;animation-delay:.4s}
@keyframes wv{0%,100%{opacity:.4;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
.hp{width:56px;height:56px;border-radius:50%;border:2px solid rgba(127,119,221,.15);display:flex;align-items:center;justify-content:center;animation:hpu 2s ease-in-out infinite}
@keyframes hpu{0%,100%{border-color:rgba(127,119,221,.1)}50%{border-color:rgba(127,119,221,.65)}}
.bm{align-self:flex-start;background:#18182A;border:1px solid rgba(127,119,221,.2);border-radius:12px 12px 12px 3px;padding:5px 8px;max-width:130px;margin-bottom:3px}
.bg2{align-self:flex-end;background:#1A4A8A;border-radius:12px 12px 3px 12px;padding:5px 8px;max-width:122px;margin-bottom:3px}
.bj{align-self:flex-start;background:#0B2B4A;border:1px solid rgba(55,138,221,.25);border-radius:12px 12px 12px 3px;padding:5px 8px;max-width:130px;margin-bottom:3px}
.btx{font-size:10px;color:#fff;line-height:1.45}
.bnm{font-size:9px;color:rgba(255,255,255,.35);margin-bottom:2px}
.cag{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:100%}
.ca{display:flex;flex-direction:column;align-items:center;gap:3px}
.cab{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer}
.cal{font-size:9px;color:rgba(255,255,255,.3);text-align:center}
.endb{width:46px;height:46px;border-radius:50%;background:#D9534F;display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer}
.suc{width:46px;height:46px;border-radius:50%;background:rgba(58,155,58,.15);border:1.5px solid #3A9B3A;display:flex;align-items:center;justify-content:center}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-tag">Customer journey prototype</div>
    <div class="header-title">Margaret's call with <span>Chase Lex Ave</span></div>
    <div class="header-sub">Powered by Maya · AI triage agent</div>
  </div>
  <div class="phase-counter">
    <strong id="phase-num">1</strong>
    of 6 phases
  </div>
</div>

<div class="stage">
  <!-- phone -->
  <div class="phone-col">
    <div class="pd">
      <div class="bl1"></div><div class="bl2"></div><div class="bl3"></div><div class="br"></div>
      <div class="pn"><div class="nc"></div><div class="ns"></div></div>
      <div class="psi">
        <div class="sb">
          <span>9:41</span>
          <div class="sbicons">
            <svg width="11" height="9" viewBox="0 0 14 11" fill="#fff"><rect x="0" y="5" width="2" height="6" rx="1"/><rect x="3" y="3" width="2" height="8" rx="1"/><rect x="6" y="1" width="2" height="10" rx="1"/><rect x="9" y="0" width="2" height="11" rx="1"/></svg>
            <svg width="13" height="9" viewBox="0 0 22 11" fill="none"><rect x=".5" y="1" width="18" height="9" rx="2" stroke="#fff" stroke-width="1"/><rect x="2" y="2.5" width="11" height="6" rx="1" fill="#fff"/><path d="M20 3.5v4c1-.7 1-3.3 0-4z" fill="#fff"/></svg>
          </div>
        </div>
        <div class="scb" id="phone-screen"></div>

    </div>

  <!-- content -->
  <div class="cc" id="content-col"></div>
</div>

<div class="timeline-wrap">
  <div class="tl-row">
    <button class="play-btn" onclick="togglePlay()">
      <svg id="playicon" viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9" fill="#fff"/></svg>
    </button>
    <div class="tl-track"><div class="tl-fill" id="tl-fill"></div></div>
  </div>
  <div class="tl-dots-row" id="tl-dots-row"></div>
</div>

<script>
const PHASES=['Trigger','AI triage','Routing','Handoff','Resolution','Wrap-up'];
let phase=0,playing=false,timer=null;

function setPhase(p){
  phase=p;
  document.getElementById('phase-num').textContent=p+1;
  const pct=p===0?0:(p/(PHASES.length-1))*100;
  document.getElementById('tl-fill').style.width=pct+'%';
  document.querySelectorAll('.tdw').forEach((w,i)=>{
    w.classList.toggle('ac',i===p);
    const d=w.querySelector('.tdot');
    d.classList.remove('done','active');
    if(i<p)d.classList.add('done');
    else if(i===p)d.classList.add('active');
  });
  render();
}

function buildTL(){
  document.getElementById('tl-dots-row').innerHTML=PHASES.map((ph,i)=>`
    <div class="tdw${i===0?' ac':''}" onclick="setPhase(${i})">
      <div class="tdot${i===0?' active':''}"></div>
      <div class="tlbl">${ph}</div>
    </div>`).join('');
}

function togglePlay(){
  playing=!playing;
  document.getElementById('playicon').innerHTML=playing
    ?'<rect x="1.5" y="1" width="3" height="8" fill="#fff"/><rect x="5.5" y="1" width="3" height="8" fill="#fff"/>'
    :'<polygon points="2,1 9,5 2,9" fill="#fff"/>';
  if(playing)autoPlay();else clearTimeout(timer);
}
function autoPlay(){if(!playing)return;setPhase((phase+1)%PHASES.length);timer=setTimeout(autoPlay,2600);}

const CC=`<div class="cag">
  <div class="ca"><div class="cab"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2"><path d="M15.5 8.5a5 5 0 010 7M12 6a8 8 0 010 12"/></svg></div><div class="cal">speaker</div></div>
  <div class="ca"><div class="cab"><svg width="15" height="15" viewBox="0 0 24 24" fill="rgba(255,255,255,.7)"><path d="M17 11c0 2.8-2.2 5-5 5s-5-2.2-5-5V5c0-2.8 2.2-5 5-5s5 2.2 5 5v6zm-5 7c3.9 0 7-3.1 7-7h-2c0 2.8-2.2 5-5 5s-5-2.2-5-5H5c0 3.9 3.1 7 7 7zm-1 3h2v-2h-2v2z"/></svg></div><div class="cal">mute</div></div>
  <div class="ca"><div class="cab"><svg width="15" height="15" viewBox="0 0 24 24" fill="rgba(255,255,255,.7)"><path d="M3 3h7v2H5v4H3V3zm11 0h7v6h-2V5h-5V3zM3 13h2v4h5v2H3v-6zm16 4h-5v2h7v-6h-2v4z"/></svg></div><div class="cal">keypad</div></div>
</div>
<div class="endb" style="margin-top:6px"><svg width="19" height="19" viewBox="0 0 24 24" fill="white" transform="rotate(135)"><path d="M3 5h4l2 5-2 2a12 12 0 005 5l2-2 5 2v4a2 2 0 01-2 2C7 22 2 17 2 7a2 2 0 012-2z"/></svg></div>`;

// ── phone screen content per phase — exact content from v2 ──
const SCREENS=[
  // Phase 0 — trigger
  `<div style="background:linear-gradient(160deg,#0C447C,#185FA5);padding:14px 12px 10px;flex-shrink:0">
    <div style="font-size:10px;color:rgba(255,255,255,.55);margin-bottom:1px">Chase Bank</div>
    <div style="font-size:13px;font-weight:500;color:#fff">Checking ••4421</div>
    <div style="font-size:22px;font-weight:300;color:#fff;margin:6px 0 2px">$3,842.50</div>
    <div style="font-size:10px;color:rgba(255,255,255,.45)">Available balance</div>
  </div>
  <div style="flex:1;padding:10px 12px;overflow:hidden">
    <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,.35);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Recent</div>
    <div style="background:rgba(229,75,74,.15);border:1px solid rgba(229,75,74,.35);border-radius:9px;padding:8px 10px;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:11px;font-weight:500;color:#fff">AMZN*MKTP</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:1px">Apr 27 · Card</div></div>
        <div style="text-align:right"><div style="font-size:12px;font-weight:500;color:#F09595">-$247.00</div><div style="font-size:10px;color:rgba(229,75,74,.8);margin-top:1px">Not recognised?</div></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.07)"><div><div style="font-size:11px;color:#fff">Trader Joe's</div><div style="font-size:10px;color:rgba(255,255,255,.35)">Apr 26</div></div><div style="font-size:11px;color:rgba(255,255,255,.6)">-$54.20</div></div>
    <div style="display:flex;justify-content:space-between;padding:7px 0"><div><div style="font-size:11px;color:#fff">Direct deposit</div><div style="font-size:10px;color:rgba(255,255,255,.35)">Apr 25</div></div><div style="font-size:11px;color:#3A9B3A">+$2,400.00</div></div>
    <div style="margin-top:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 10px">
      <div style="font-size:10px;color:rgba(255,255,255,.4);margin-bottom:3px">Google search</div>
      <div style="font-size:11px;color:#fff">"Chase Lex Ave branch number"</div>
      <div style="font-size:10px;color:#85B7EB;margin-top:3px">→ (212) 555-0142</div>
    </div>
  </div>`,

  // Phase 1 — AI triage
  `<div style="flex:1;display:flex;flex-direction:column;padding:8px 10px 0">
    <div style="text-align:center;margin-bottom:8px">
      <div style="font-size:10px;color:rgba(127,119,221,.7);letter-spacing:.5px;text-transform:uppercase">Chase · Lex Ave Branch</div>
      <div style="font-size:12px;font-weight:500;color:#fff">Maya · AI triage agent</div>
      <div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:1px">1:34</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;gap:0">
      <div class="bm"><div class="bnm">Maya</div><div class="btx">Hi, I'm Maya from Chase Lex Ave. Before we begin — please don't share any PII like SSN or card numbers. What can I help you with today?</div></div>
      <div class="bg2"><div class="btx">Hi — there's a $247 charge on my account I don't recognise. Amazon.</div></div>
      <div class="bm"><div class="bnm">Maya</div><div class="btx">Got it. When did it appear, and have you made any Amazon purchases recently?</div></div>

    <div style="margin-top:auto;padding-bottom:4px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:5px 8px;background:rgba(127,119,221,.12);border:1px solid rgba(127,119,221,.25);border-radius:8px">
        <div style="width:6px;height:6px;border-radius:50%;background:#7F77DD;flex-shrink:0;animation:pdot 1s infinite"></div>
        <div style="font-size:10px;color:rgba(255,255,255,.5)">Speak naturally · can interrupt</div>
      </div>
      ${CC}
    </div>
  </div>`,

  // Phase 2 — routing & logging
  `<div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 12px 0">
    <div style="font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px">on hold</div>
    <div style="font-size:14px;font-weight:500;color:#fff;margin-bottom:2px">Chase · Lex Ave Branch</div>
    <div style="font-size:10px;color:rgba(127,119,221,.7);margin-bottom:12px">Maya · finding call center specialist…</div>
    <div class="hp" style="margin-bottom:10px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(127,119,221,.7)"><path d="M3 5h4l2 5-2 2a12 12 0 005 5l2-2 5 2v4a2 2 0 01-2 2C7 22 2 17 2 7a2 2 0 012-2z"/></svg>
    </div>
    <div style="font-size:12px;font-weight:500;color:#fff;margin-bottom:3px">Connecting you…</div>
    <div style="font-size:10px;color:rgba(255,255,255,.35);text-align:center;line-height:1.5;margin-bottom:10px">Maya is logging the conversation</div>
    <div style="width:130px;background:rgba(255,255,255,.06);border:1px solid rgba(127,119,221,.2);border-radius:7px;padding:8px 10px">
      <div style="font-size:9px;color:rgba(127,119,221,.6);margin-bottom:4px">Writing to database…</div>
      <div style="height:2px;background:rgba(127,119,221,.15);border-radius:1px;margin-bottom:3px"><div style="width:85%;height:100%;background:#7F77DD;border-radius:1px"></div></div>
      <div style="height:2px;background:rgba(127,119,221,.15);border-radius:1px;margin-bottom:3px"><div style="width:65%;height:100%;background:#7F77DD;border-radius:1px"></div></div>
      <div style="height:2px;background:rgba(127,119,221,.15);border-radius:1px"><div style="width:45%;height:100%;background:#7F77DD;border-radius:1px"></div></div>
    </div>
    <div style="margin-top:auto;width:100%;padding-bottom:4px">${CC}</div>
  </div>`,

  // Phase 3 — handoff
  `<div style="flex:1;display:flex;flex-direction:column;padding:8px 10px 0">
    <div style="text-align:center;margin-bottom:8px">
      <div style="font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;text-transform:uppercase">3-way · Lex Ave Branch</div>
      <div style="font-size:12px;font-weight:500;color:#fff">Maya + James T.</div>
      <div style="font-size:10px;color:#378ADD;margin-top:1px">Handing over now</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;gap:0">
      <div class="bm"><div class="bnm">Maya</div><div class="btx">James, I have Margaret on the line. Unrecognised $247 AMZN charge Apr 27. Connecting her now.</div></div>
      <div style="align-self:center;font-size:9px;color:rgba(255,255,255,.25);padding:3px 0">James joined the call</div>
      <div class="bj"><div class="bnm" style="color:rgba(55,138,221,.6)">James</div><div class="btx">Thanks Maya. Hi Margaret — I'm James, your call center specialist. I have the full picture. Let's get this sorted.</div></div>
