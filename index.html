<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chase Lex Ave — Call Flow Prototype</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#F5F4EF;display:flex;justify-content:center;padding:24px 16px;min-height:100vh}
.proto{width:100%;max-width:780px;border:1.5px solid #888780;border-radius:12px;overflow:hidden;background:#fff}
.char-bar{display:flex;border-bottom:1.5px solid #888780;background:#F1EFE8}
.char-btn{flex:1;padding:10px 4px 8px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border:none;border-right:1px solid #B4B2A9;background:none;color:#5F5E5A;border-bottom:3px solid transparent;transition:all .15s;line-height:1.3}
.char-btn:last-child{border-right:none}
.char-btn .role{font-size:10px;font-weight:400;color:#888780;display:block;margin-top:1px}
.char-btn.active{color:#2C2C2A;border-bottom-color:#2C2C2A;background:#fff}
.char-btn:hover:not(.active){background:#D3D1C7;color:#2C2C2A}
.view-area{min-height:460px;padding:20px}
.view{display:none;width:100%}
.view.active{display:flex;gap:24px;align-items:flex-start}
/* badges */
.pb{display:inline-block;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;margin-bottom:14px;letter-spacing:0.04em;border:1px solid transparent}
.pg{background:#F1EFE8;color:#444441;border-color:#B4B2A9}
.pbl{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.pgr{background:#EAF3DE;color:#27500A;border-color:#97C459}
.pa{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.pp{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
/* cards */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border:1.5px solid #B4B2A9;border-radius:10px;padding:12px}
.card h4{font-size:10px;font-weight:500;color:#5F5E5A;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #D3D1C7;display:flex;justify-content:space-between;align-items:center}
.cr{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:.5px solid #D3D1C7}
.cr:last-child{border-bottom:none}
.lb{color:#5F5E5A;flex-shrink:0;margin-right:8px}
.vl{font-weight:500;color:#2C2C2A;text-align:right}
.vf{font-weight:500;color:#791F1F;text-align:right}
.vo{font-weight:500;color:#27500A;text-align:right}
/* alert bars */
.abar{display:flex;align-items:center;gap:8px;border:1.5px solid #85B7EB;border-radius:8px;background:#E6F1FB;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#0C447C}
.abar.gr{border-color:#97C459;background:#EAF3DE;color:#27500A}
.abar.pu{border-color:#AFA9EC;background:#EEEDFE;color:#3C3489}
.adot{width:8px;height:8px;border-radius:50%;background:#378ADD;flex-shrink:0;animation:pdot 1.5s infinite}
.adot.g{background:#639922;animation:none}
.adot.p{background:#7F77DD;animation:none}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
.mbar{border:1.5px solid #EF9F27;border-radius:8px;background:#FAEEDA;padding:8px 10px;font-size:11px;color:#633806;margin-top:8px}
/* side note */
.sn{flex:1;padding-top:4px}
.sn .ti{font-size:12px;font-weight:500;margin-bottom:6px;color:#2C2C2A}
.sn .bo{font-size:12px;color:#5F5E5A;line-height:1.6}
.sn .fo{margin-top:8px;font-size:11px;color:#888780}
.hl{background:#EAF3DE;border:1px solid #97C459;border-radius:6px;padding:7px 10px;font-size:11px;color:#27500A;margin-top:8px}
.hlp{background:#EEEDFE;border:1px solid #AFA9EC;border-radius:6px;padding:7px 10px;font-size:11px;color:#3C3489;margin-top:8px}
/* edit */
.ebt{font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;border:1.5px solid #B4B2A9;background:#F1EFE8;color:#5F5E5A;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.ebt:hover{background:#D3D1C7;border-color:#888780;color:#2C2C2A}
.ebt.sv{border-color:#97C459;background:#EAF3DE;color:#27500A}
.ei{width:100%;border:1.5px solid #85B7EB;border-radius:5px;padding:2px 5px;font-size:12px;font-weight:500;color:#2C2C2A;background:#fff;outline:none;text-align:right;font-family:inherit}
/* action buttons */
.ab{display:flex;align-items:flex-start;gap:10px;width:100%;padding:10px 11px;margin-bottom:8px;border-radius:8px;border:1.5px solid #D3D1C7;background:#fff;cursor:pointer;text-align:left;transition:border-color .15s,background .15s}
.ab:last-child{margin-bottom:0}
.ab:hover{border-color:#888780;background:#F1EFE8}
.ab.pr{border-color:#85B7EB;background:#E6F1FB}
.ab.pr:hover{border-color:#378ADD;background:#D4E9F7}
.al{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.ala{background:#E6F1FB;color:#0C447C;border:1px solid #85B7EB}
.alb{background:#F1EFE8;color:#444441;border:1px solid #D3D1C7}
.ati{font-size:12px;font-weight:500;color:#2C2C2A;margin-bottom:2px}
.ade{font-size:11px;color:#5F5E5A;line-height:1.4}
/* empty state */
.es{text-align:center;padding:36px 20px;color:#888780;width:100%}
.eti{font-size:13px;font-weight:500;color:#5F5E5A;margin-bottom:6px}
.ebo{font-size:12px;color:#888780;line-height:1.6}
.em{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;opacity:.3}
.gb{padding:6px 14px;border-radius:6px;border:1.5px solid #D3D1C7;background:none;cursor:pointer;font-size:11px;color:#5F5E5A;margin-top:12px}
.gb:hover{background:#F1EFE8}
/* metrics */
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mc{background:#F1EFE8;border:1.5px solid #D3D1C7;border-radius:8px;padding:10px;text-align:center}
.mc .ml{font-size:10px;color:#5F5E5A;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.mc .mv{font-size:20px;font-weight:500;color:#2C2C2A}
.mc .md{font-size:10px;margin-top:2px;color:#3B6D11}
/* queue */
.qi{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;background:#fff;border:1.5px solid #D3D1C7;margin-bottom:6px;font-size:12px}
.qi.ic{border-color:#378ADD;background:#E6F1FB}
.qa{width:30px;height:30px;border-radius:50%;background:#E6F1FB;border:1px solid #85B7EB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#0C447C;flex-shrink:0}
.qn{font-weight:500;font-size:12px;color:#2C2C2A}
.qs{color:#5F5E5A;font-size:11px}
.qb{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;border:1px solid}
.qbn{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.qbw{background:#F1EFE8;color:#5F5E5A;border-color:#D3D1C7}
.sf{border:1.5px solid #EF9F27;border-radius:8px;background:#FAEEDA;padding:9px 11px;font-size:11px;color:#633806;margin-bottom:12px}
/* phone */
.pc{flex-shrink:0;width:200px}
.pd{width:200px;height:420px;background:#1C1C1E;border-radius:36px;padding:0 8px 10px;border:1.5px solid #3A3A3C;position:relative;display:flex;flex-direction:column}
.bl1{position:absolute;left:-4px;top:72px;width:3px;height:26px;background:#3A3A3C;border-radius:2px 0 0 2px}
.bl2{position:absolute;left:-4px;top:108px;width:3px;height:44px;background:#3A3A3C;border-radius:2px 0 0 2px}
.bl3{position:absolute;left:-4px;top:162px;width:3px;height:44px;background:#3A3A3C;border-radius:2px 0 0 2px}
.br{position:absolute;right:-4px;top:100px;width:3px;height:60px;background:#3A3A3C;border-radius:0 2px 2px 0}
.pn{width:80px;height:22px;background:#1C1C1E;border-radius:0 0 14px 14px;margin:0 auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:6px}
.nc{width:7px;height:7px;border-radius:50%;background:#2C2C2E;border:1px solid #3A3A3C}
.ns{width:36px;height:4px;border-radius:2px;background:#2C2C2E}
.psi{flex:1;background:#000;border-radius:0 0 28px 28px;overflow:hidden;display:flex;flex-direction:column}
.sb{display:flex;justify-content:space-between;align-items:center;padding:6px 14px 2px;font-size:10px;font-weight:500;color:#fff;flex-shrink:0}
.scb{flex:1;overflow:hidden;display:flex;flex-direction:column}
.hb{height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hi{width:70px;height:3px;background:#444;border-radius:2px}
.wf{display:flex;align-items:center;justify-content:center;gap:3px;height:18px}
.wb{width:3px;border-radius:2px;background:rgba(255,255,255,.6);animation:wv .8s ease-in-out infinite}
.wb:nth-child(1){height:6px}.wb:nth-child(2){height:11px;animation-delay:.1s}.wb:nth-child(3){height:16px;animation-delay:.2s}.wb:nth-child(4){height:8px;animation-delay:.3s}.wb:nth-child(5){height:13px;animation-delay:.4s}
@keyframes wv{0%,100%{opacity:.4;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
.hp{width:60px;height:60px;border-radius:50%;border:2px solid rgba(127,119,221,.2);display:flex;align-items:center;justify-content:center;animation:hpu 2s ease-in-out infinite}
@keyframes hpu{0%,100%{border-color:rgba(127,119,221,.15)}50%{border-color:rgba(127,119,221,.7)}}
.cag{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%}
.ca{display:flex;flex-direction:column;align-items:center;gap:4px}
.cb{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer}
.cl{font-size:10px;color:rgba(255,255,255,.4);text-align:center}
.endb{width:50px;height:50px;border-radius:50%;background:#D9534F;display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer}
.av{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:#fff;border:2px solid rgba(255,255,255,.15)}
.suc{width:52px;height:52px;border-radius:50%;background:rgba(58,155,58,.2);border:2px solid #3A9B3A;display:flex;align-items:center;justify-content:center}
/* chat bubbles */
.bm{align-self:flex-start;background:#1A1A2E;border:1px solid #3A3A5C;border-radius:14px 14px 14px 3px;padding:6px 9px;max-width:145px;margin-bottom:4px}
.bg2{align-self:flex-end;background:#185FA5;border-radius:14px 14px 3px 14px;padding:6px 9px;max-width:135px;margin-bottom:4px}
.bj{align-self:flex-start;background:#0C3354;border:1px solid rgba(55,138,221,.3);border-radius:14px 14px 14px 3px;padding:6px 9px;max-width:145px;margin-bottom:4px}
.btx{font-size:10px;color:#fff;line-height:1.4}
.bnm{font-size:9px;color:rgba(255,255,255,.4);margin-bottom:2px}
/* timeline */
.tlw{padding:14px 20px 16px;border-top:1.5px solid #888780;background:#F1EFE8}
.tlt{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.plb{width:28px;height:28px;border-radius:50%;border:1.5px solid #888780;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tlr{flex:1;position:relative;height:28px;display:flex;align-items:center}
.tll{position:absolute;left:0;right:0;height:3px;background:#D3D1C7;border-radius:2px}
.tlf{position:absolute;left:0;height:3px;background:#2C2C2A;border-radius:2px;transition:width .2s}
.tldots{position:absolute;left:0;right:0;display:flex;justify-content:space-between}
.tldo{width:10px;height:10px;border-radius:50%;border:2px solid #888780;background:#F1EFE8;cursor:pointer;transition:all .15s;flex-shrink:0}
.tldo.dn{background:#2C2C2A;border-color:#2C2C2A}
.tldo.ac{background:#fff;border-color:#2C2C2A;border-width:2.5px;box-shadow:0 0 0 3px rgba(44,44,42,.15)}
.tldo:hover{border-color:#2C2C2A;transform:scale(1.25)}
.tlls{display:flex;justify-content:space-between}
.tlla{font-size:10px;color:#888780;text-align:center;cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .15s;line-height:1.3;flex:1}
.tlla:hover{color:#2C2C2A;background:#D3D1C7}
.tlla.ac{color:#2C2C2A;font-weight:600}
</style>
</head>
<body>
<div class="proto">
  <div class="char-bar">
    <button class="char-btn active" onclick="sw('margaret',this)">Margaret<span class="role">Caller</span></button>
    <button class="char-btn" onclick="sw('raymond',this)">Raymond<span class="role">Branch banker</span></button>
    <button class="char-btn" onclick="sw('specialist',this)">Specialist<span class="role">Call center</span></button>
    <button class="char-btn" onclick="sw('asif',this)">Asif<span class="role">Ops manager</span></button>
  </div>
  <div class="view-area">
    <div class="view active" id="v-margaret"></div>
    <div class="view" id="v-raymond"></div>
    <div class="view" id="v-specialist"></div>
    <div class="view" id="v-asif"></div>
  </div>
  <div class="tlw">
    <div class="tlt">
      <button class="plb" id="playbtn" onclick="togglePlay()"><svg id="playicon" width="10" height="10" viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9" fill="#2C2C2A"/></svg></button>
      <div class="tlr">
        <div class="tll"></div>
        <div class="tlf" id="tlf"></div>
        <div class="tldots" id="tld"></div>
      </div>
    </div>
    <div class="tlls" id="tlls"></div>
  </div>
</div>

<script>
const PHASES=['Trigger','AI triage','Routing','Handoff','Resolution','Wrap-up'];
const CHARS=['margaret','raymond','specialist','asif'];
let cur='margaret',phase=0,playing=false,timer=null,summaryEditing=false;
let SD={name:'Margaret Hooper',account:'••4421 (checking)',branch:'Lex Ave Branch',since:'2011',issue:'Dispute — $247 AMZN',risk:'74 / high'};

function sw(c,btn){cur=c;CHARS.forEach(x=>document.getElementById('v-'+x).classList.remove('active'));document.querySelectorAll('.char-btn').forEach(b=>b.classList.remove('active'));document.getElementById('v-'+c).classList.add('active');btn.classList.add('active');render();}
function setPhase(p){phase=p;summaryEditing=false;updateTL();render();}
function updateTL(){
  const pct=phase===0?0:(phase/(PHASES.length-1)*100);
  document.getElementById('tlf').style.width=pct+'%';
  document.querySelectorAll('.tldo').forEach((d,i)=>{d.classList.remove('dn','ac');if(i<phase)d.classList.add('dn');else if(i===phase)d.classList.add('ac');});
  document.querySelectorAll('.tlla').forEach((l,i)=>l.classList.toggle('ac',i===phase));
}
function buildTL(){
  document.getElementById('tld').innerHTML=PHASES.map((_,i)=>`<div class="tldo${i===0?' ac':''}" onclick="setPhase(${i})"></div>`).join('');
  document.getElementById('tlls').innerHTML=PHASES.map((ph,i)=>`<div class="tlla${i===0?' ac':''}" onclick="setPhase(${i})">${ph}</div>`).join('');
}
function togglePlay(){playing=!playing;document.getElementById('playicon').innerHTML=playing?'<rect x="1.5" y="1" width="3" height="8" fill="#2C2C2A"/><rect x="5.5" y="1" width="3" height="8" fill="#2C2C2A"/>':'<polygon points="2,1 9,5 2,9" fill="#2C2C2A"/>';if(playing)autoPlay();else clearTimeout(timer);}
function autoPlay(){if(!playing)return;setPhase((phase+1)%PHASES.length);timer=setTimeout(autoPlay,2400);}
function render(){rM();rR();rS();rA();}

const SI=`<svg width="12" height="10" viewBox="0 0 14 11" fill="#fff"><rect x="0" y="5" width="2" height="6" rx="1"/><rect x="3" y="3" width="2" height="8" rx="1"/><rect x="6" y="1" width="2" height="10" rx="1"/><rect x="9" y="0" width="2" height="11" rx="1"/></svg><svg width="12" height="10" viewBox="0 0 14 11" fill="#fff"><path d="M7 2C9.2 2 11.2 3 12.6 4.6L11.4 5.8C10.3 4.5 8.8 3.7 7 3.7S3.7 4.5 2.6 5.8L1.4 4.6C2.8 3 4.8 2 7 2zM7 5.5c1.4 0 2.5.6 3.3 1.5L9.1 8.1C8.5 7.4 7.8 7 7 7s-1.5.4-2.1 1.1L3.7 7C4.5 6.1 5.6 5.5 7 5.5zM7 9a1.5 1.5 0 110 3A1.5 1.5 0 017 9z"/></svg><svg width="22" height="10" viewBox="0 0 22 11" fill="none"><rect x=".5" y="1" width="18" height="9" rx="2" stroke="#fff" stroke-width="1"/><rect x="2" y="2.5" width="12" height="6" rx="1" fill="#fff"/><path d="M20 3.5v4c1-.7 1-3.3 0-4z" fill="#fff"/></svg>`;

const CC=`<div class="cag"><div class="ca"><div class="cb"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.75)" stroke-width="1.8"><path d="M15.5 8.5a5 5 0 010 7M12 6a8 8 0 010 12"/></svg></div><div class="cl">speaker</div></div><div class="ca"><div class="cb"><svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(255,255,255,.75)"><path d="M17 11c0 2.8-2.2 5-5 5s-5-2.2-5-5V5c0-2.8 2.2-5 5-5s5 2.2 5 5v6zm-5 7c3.9 0 7-3.1 7-7h-2c0 2.8-2.2 5-5 5s-5-2.2-5-5H5c0 3.9 3.1 7 7 7zm-1 3h2v-2h-2v2z"/></svg></div><div class="cl">mute</div></div><div class="ca"><div class="cb"><svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(255,255,255,.75)"><path d="M3 3h7v2H5v4H3V3zm11 0h7v6h-2V5h-5V3zM3 13h2v4h5v2H3v-6zm16 4h-5v2h7v-6h-2v4z"/></svg></div><div class="cl">keypad</div></div></div><div class="endb" style="margin-top:8px"><svg width="20" height="20" viewBox="0 0 24 24" fill="white" transform="rotate(135)"><path d="M3 5h4l2 5-2 2a12 12 0 005 5l2-2 5 2v4a2 2 0 01-2 2C7 22 2 17 2 7a2 2 0 012-2z"/></svg></div>`;

function phone(body){return`<div class="pc"><div class="pd"><div class="bl1"></div><div class="bl2"></div><div class="bl3"></div><div class="br"></div><div class="pn"><div class="nc"></div><div class="ns"></div></div><div class="psi"><div class="sb"><span>9:41</span><div style="display:flex;align-items:center;gap:3px">${SI}</div></div><div class="scb">${body}</div><div class="hb"><div class="hi"></div></div></div></div></div>`;}

function rM(){
  const el=document.getElementById('v-margaret');const p=phase;
  let body='',note='',badge='',bc='pg';
  if(p===0){
